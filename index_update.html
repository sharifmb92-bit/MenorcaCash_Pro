<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menorca Cash | medbasha</title>
    
    <!-- Configuración PWA Nativa con tus imágenes -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-512.png">
    
    <style>
        :root {
            --bg: #1a1a1a; --card: #262626; --text: #f0f0f0;
            --blue: #3498db; --orange: #e67e22; --grey: #95a5a6;
            --purple: #9b59b6; --red: #e74c3c; --green: #2ecc71;
            --yellow: #f1c40f;
        }
        * { -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; box-sizing: border-box; }
        input { -webkit-user-select: auto; user-select: auto; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 12px; overflow-x: hidden; }
        
        /* Dashboard Principal con Alertas */
        .dashboard { background: var(--card); padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 15px; border-bottom: 4px solid var(--green); cursor: pointer; transition: 0.3s ease; position: relative; }
        .app-name { font-size: 0.8em; letter-spacing: 2px; color: var(--grey); text-transform: uppercase; margin-bottom: 5px; }
        .balance { font-size: 2.4em; font-weight: bold; margin: 5px 0; color: var(--green); transition: 0.3s; }
        .sub-label { font-size: 0.6em; color: var(--grey); letter-spacing: 1px; }

        /* Estados de Alerta del Límite */
        .dashboard.warning-limit { border-bottom-color: var(--orange); animation: pulse-orange 1.5s infinite alternate; }
        .dashboard.danger-limit { border-bottom-color: var(--red); animation: flash-red 0.8s infinite alternate; }

        @keyframes pulse-orange { 0% { box-shadow: 0 0 4px rgba(230, 126, 34, 0.2); } 100% { box-shadow: 0 0 15px rgba(230, 126, 34, 0.6); } }
        @keyframes flash-red { 0% { background: var(--card); } 100% { background: #3a1c1c; box-shadow: 0 0 20px rgba(231, 76, 60, 0.7); } }

        .section-title { font-size: 0.75em; color: #888; text-transform: uppercase; margin: 18px 0 8px 5px; letter-spacing: 1px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .btn { background: var(--card); border: none; color: white; padding: 16px; border-radius: 12px; font-size: 0.9em; text-align: left; transition: 0.2s; border-left: 4px solid transparent; outline: none; }
        .btn:active { background: #333; transform: scale(0.96); }
        
        .l-diario { border-left-color: var(--blue); } .l-online { border-left-color: var(--orange); }
        .l-motor { border-left-color: var(--grey); } .l-familia { border-left-color: var(--red); }
        .l-niños { border-left-color: var(--yellow); } .l-fijos { border-left-color: var(--purple); }
        .l-manual { border-left-color: #1abc9c; background: #2c3e50; } /* Estilo especial botón manual */

        input#monto { width: 100%; background: transparent; border: none; border-bottom: 2px solid #333; color: white; font-size: 2.2em; text-align: center; padding: 10px; margin-bottom: 10px; outline: none; transition: 0.3s; }
        input#monto.error { border-bottom-color: var(--red); animation: shake 0.3s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

        /* Pantallas Completas */
        .full-screen { position: fixed; top: 0; left: 100%; width: 100%; height: 100%; background: var(--bg); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .full-screen.active { left: 0; }
        .header-alt { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .btn-back { background: var(--card); border: none; color: white; padding: 10px 15px; border-radius: 10px; }

        .config-input { width: 100%; background: var(--card); border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 1em; }
        .btn-save { width: 100%; background: var(--green); color: black; border: none; padding: 15px; border-radius: 10px; font-weight: bold; margin-top: 10px; }
        
        table { width: 100%; border-collapse: collapse; }
        td { padding: 15px 0; border-bottom: 1px solid #333; font-size: 0.9em; }
        .hist-monto { text-align: right; font-weight: bold; color: var(--red); }
        .hist-ingreso { color: var(--green) !important; }

        .nav-btns { position: fixed; bottom: 20px; right: 20px; display: flex; gap: 10px; z-index: 90; }
        .btn-round { background: var(--green); color: black; border: none; width: 50px; height: 50px; border-radius: 25px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; }
        .btn-config { background: var(--grey); }

        /* Tu sello medbasha disimulado */
        .firma { position: fixed; bottom: 10px; left: 15px; font-size: 0.55em; color: #222; pointer-events: none; letter-spacing: 2px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="pantalla-principal">
        <div class="dashboard" id="panel-control" onclick="abrirHistorial()">
            <div class="app-name">Menorca Cash</div>
            <div class="balance" id="total">0,00 €</div>
            <div class="sub-label" id="estado-texto">DISPONIBLE VIRTUAL</div>
        </div>

        <input type="number" id="monto" placeholder="0.00" inputmode="decimal">

        <div class="section-title">Día a día y Caprichos</div>
        <div class="grid">
            <button class="btn l-diario" onclick="addGasto('☕ Diario')">☕ Diario</button>
            <button class="btn l-online" onclick="addGasto('📦 Capricho')">📦 Capricho</button>
        </div>

        <div class="section-title">Vehículos</div>
        <div class="grid">
            <button class="btn l-motor" onclick="addGasto('⛽ Gasolina')">⛽ Gasolina</button>
            <button class="btn l-motor" onclick="addGasto('🔧 Mecánico')">🔧 Mecánico</button>
        </div>

        <div class="section-title">Familia y Hogar</div>
        <div class="grid">
            <button class="btn l-familia" onclick="addGasto('💸 Ayuda Ext.')">💸 Ayuda Ext.</button>
            <button class="btn l-niños" onclick="addGasto('👦 Niños')">👦 Niños</button>
        </div>

        <div class="section-title">Recibos e Imprevistos</div>
        <div class="grid">
            <button class="btn l-fijos" onclick="addGasto('📡 Tlf / Net')">📡 Tlf / Net</button>
            <button class="btn l-manual" onclick="addGastoManual()">📝 Gasto Manual</button>
        </div>
        
        <div style="height: 80px;"></div>
    </div>

    <!-- PANTALLA HISTORIAL -->
    <div id="pantalla-historial" class="full-screen">
        <div class="header-alt">
            <div style="font-weight: bold; color: var(--green);">HISTORIAL DE MOVIMIENTOS</div>
            <button class="btn-back" onclick="cerrarPantallas()">VOLVER</button>
        </div>
        <table id="lista-gastos"><tbody></tbody></table>
        <div style="height: 100px;"></div>
    </div>

    <!-- PANTALLA CONFIGURACIÓN -->
    <div id="pantalla-config" class="full-screen">
        <div class="header-alt">
            <div style="font-weight: bold; color: var(--orange);">PRESUPUESTO VIRTUAL</div>
            <button class="btn-back" onclick="cerrarPantallas()">VOLVER</button>
        </div>
        <p style="font-size: 0.8em; color: #888;">Elige la cantidad límite con la que deseas empezar a restar:</p>
        
        <label style="font-size: 0.7em;">CANTIDAD ASIGNADA (€)</label>
        <input type="number" id="input-sueldo" class="config-input" placeholder="Ej: 500">
        
        <button class="btn-save" onclick="iniciarNuevoMes()">🔄 REINICIAR CANTIDAD VIRTUAL</button>
    </div>

    <div class="nav-btns">
        <button class="btn-round btn-config" onclick="abrirConfig()">⚙️</button>
        <button class="btn-round" onclick="abrirHistorial()">🕒</button>
    </div>
    
    <!-- Tu sello medbasha disimulado -->
    <div class="firma">medbasha</div>

    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

        let balance = parseFloat(localStorage.getItem('balance_mb')) || 0;
        let cantidadMax = parseFloat(localStorage.getItem('conf_sueldo')) || 0;
        let historial = JSON.parse(localStorage.getItem('historial_mb')) || [];

        function vibrate() {
            if (navigator.vibrate) navigator.vibrate(40);
        }

        function renderApp() {
            // Renderizado del saldo
            document.getElementById('total').innerText = balance.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " €";
            
            // Lógica de avisos dinámicos y cambios de color según el límite
            const panel = document.getElementById('panel-control');
            const textoEstado = document.getElementById('estado-texto');
            const totalEuros = document.getElementById('total');

            panel.className = "dashboard"; // reset
            totalEuros.style.color = "var(--green)";
            textoEstado.innerText = "DISPONIBLE VIRTUAL";

            if (balance <= 0) {
                panel.classList.add('danger-limit');
                totalEuros.style.color = "var(--red)";
                textoEstado.innerText = "🛑 ¡LÍMITE ALCANZADO!";
            } else if (cantidadMax > 0 && balance <= (cantidadMax * 0.15)) {
                panel.classList.add('warning-limit');
                totalEuros.style.color = "var(--orange)";
                textoEstado.innerText = "⚠️ CASI AL LÍMITE MAXIMO";
            }

            // Renderizado del historial de gastos
            const tbody = document.querySelector('#lista-gastos tbody');
            tbody.innerHTML = "";
            
            historial.forEach((item, i) => {
                const fila = tbody.insertRow();
                fila.onclick = () => { if(confirm(`¿Borrar "${item.concepto}"?`)) borrarGasto(i); };
                
                const esIngreso = item.monto < 0;
                const displayMonto = esIngreso ? `+${Math.abs(item.monto).toFixed(2)}` : `-${item.monto.toFixed(2)}`;
                
                fila.innerHTML = `
                    <td style="color: #ccc;">${item.concepto}</td>
                    <td class="hist-monto ${esIngreso ? 'hist-ingreso' : ''}">${displayMonto} €</td>
                `;
            });
        }

        function addGasto(concepto) {
            const mInput = document.getElementById('monto');
            const monto = parseFloat(mInput.value);
            
            if (isNaN(monto) || monto <= 0) {
                mInput.classList.add('error');
                setTimeout(() => mInput.classList.remove('error'), 300);
                return;
            }

            vibrate();
            balance -= monto;
            historial.unshift({ concepto, monto, fecha: new Date().getTime() });
            
            guardarYRefrescar();
            mInput.value = "";
        }

        // Nueva función para añadir un gasto escribiendo el nombre libremente
        function addGastoManual() {
            const mInput = document.getElementById('monto');
            const monto = parseFloat(mInput.value);
            
            if (isNaN(monto) || monto <= 0) {
                mInput.classList.add('error');
                setTimeout(() => mInput.classList.remove('error'), 300);
                return;
            }

            let conceptoPersonalizado = prompt("Introduce el concepto de este gasto:");
            if (conceptoPersonalizado === null) return; // Si cancela, no hace nada
            if (conceptoPersonalizado.trim() === "") conceptoPersonalizado = "📝 Gasto Manual";

            vibrate();
            balance -= monto;
            historial.unshift({ concepto: conceptoPersonalizado.trim(), monto, fecha: new Date().getTime() });
            
            guardarYRefrescar();
            mInput.value = "";
        }

        function borrarGasto(i) {
            vibrate();
            const item = historial[i];
            balance += item.monto;
            historial.splice(i, 1);
            guardarYRefrescar();
        }

        function iniciarNuevoMes() {
            const s = parseFloat(document.getElementById('input-sueldo').value) || 0;
            if (s <= 0) return alert("Por favor, introduce una cantidad válida.");
            
            if(confirm(`¿Iniciar fondo virtual con ${s}€?`)) {
                vibrate();
                balance = s;
                cantidadMax = s;
                historial = [{ concepto: "💰 Fondo Inicial", monto: -s, fecha: new Date().getTime() }];
                
                localStorage.setItem('conf_sueldo', s);
                guardarYRefrescar();
                cerrarPantallas();
            }
        }

        function guardarYRefrescar() {
            localStorage.setItem('balance_mb', balance);
            localStorage.setItem('historial_mb', JSON.stringify(historial));
            renderApp();
        }

        function abrirHistorial() { vibrate(); document.getElementById('pantalla-historial').classList.add('active'); }
        function abrirConfig() { 
            vibrate();
            document.getElementById('pantalla-config').classList.add('active'); 
            document.getElementById('input-sueldo').value = localStorage.getItem('conf_sueldo') || "";
        }
        function cerrarPantallas() { 
            document.getElementById('pantalla-historial').classList.remove('active'); 
            document.getElementById('pantalla-config').classList.remove('active'); 
        }

        renderApp();
    </script>
</body>
</html>
